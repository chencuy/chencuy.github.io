<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Space - 个人导航页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+SC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #a7aceb 0%, #d2a1f0 50%, #e8b7eb 100%);
            min-height: 100vh;
            font-family: 'Noto Sans SC', 'Inter', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
        }

        /* 核心毛玻璃样式 */
        .glass {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
        }

        /* 头像光晕 */
        .avatar-container {
            border: 4px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.3);
        }

        /* 隐藏滚动条 */
        ::-webkit-scrollbar { width: 0; }

        .search-input {
            background: rgba(255, 255, 255, 0.95);
            color: #4a4a4a;
        }
    </style>
</head>
<body>

    <div class="w-full max-w-4xl">
        <div class="flex flex-col items-center md:flex-row md:items-start md:justify-center gap-8 mb-16">
            <div class="relative">
                <div class="w-32 h-32 rounded-full avatar-container overflow-hidden bg-gray-200">
                    <img src="avatar1.jpg" alt="Profile" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=Felix'" class="w-full h-full object-cover">
                </div>
                <p class="text-center mt-3 text-sm font-light opacity-80 uppercase tracking-widest">profile Picture</p>
            </div>

            <div class="flex flex-col items-center md:items-start justify-center pt-4">
                <div class="flex items-baseline gap-4 mb-4">
                    <h1 class="text-5xl font-bold tracking-tight">墨云小白</h1>
                    <span class="text-2xl font-light opacity-90">- Aura Space</span>
                </div>
                <div class="glass px-8 py-3 text-4xl font-mono tracking-tighter" id="clock">
                    00:00:00
                </div>
            </div>
        </div>

        <div class="mb-12">
            <h3 class="text-lg font-semibold mb-4 ml-2">Search</h3>
            <form action="https://www.google.com/search" method="get" target="_blank" class="relative group">
                <div class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
                <input type="text" name="q" placeholder="https://www.google.com/search" 
                    class="w-full pl-14 pr-16 py-4 rounded-2xl search-input outline-none shadow-lg text-lg transition-all focus:ring-4 focus:ring-purple-300/50">
                <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 bg-gray-400 hover:bg-gray-500 text-white p-2 rounded-xl transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </button>
            </form>
        </div>

        <div class="mb-12">
    <h3 class="text-lg font-semibold mb-6 ml-2 text-white/90">Widget</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
        
        <a href="https://github.com" target="_blank" class="glass p-5 flex items-center gap-4">
            <img src="https://github.githubassets.com/favicons/favicon.svg" class="w-8 h-8 rounded-lg" alt="GitHub">
            <span class="font-medium">GitHub</span>
        </a>

        <a href="https://chatgpt.com" target="_blank" class="glass p-5 flex items-center gap-4">
            <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-[10px] font-bold text-white shadow-inner">AI</div>
            <span class="font-medium">ChatGPT</span>
        </a>

        <a href="https://www.youtube.com" target="_blank" class="glass p-5 flex items-center gap-4">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
            </div>
            <span class="font-medium">YouTube</span>
        </a>

        <a href="https://www.notion.so" target="_blank" class="glass p-5 flex items-center gap-4">
            <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-black font-bold text-sm shadow-sm">N</div>
            <span class="font-medium">Notion</span>
        </a>

        <a href="https://dribbble.com" target="_blank" class="glass p-5 flex items-center gap-4">
            <div class="w-8 h-8 bg-pink-500 rounded-lg flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 24C5.385 24 0 18.615 0 12S5.385 0 12 0s12 5.385 12 12-5.385 12-12 12zm10.12-10.358c-.35-.11-3.17-.953-6.384-.438 1.34 3.684 1.887 6.684 1.992 7.308 2.522-1.716 4.14-4.6 4.392-6.87z"/></svg>
            </div>
            <span class="font-medium">Dribbble</span>
        </a>

        <a href="https://www.bilibili.com" target="_blank" class="glass p-5 flex items-center gap-4">
            <div class="w-8 h-8 bg-sky-400 rounded-lg flex items-center justify-center">
                <span class="text-white text-[10px] font-bold">Bili</span>
            </div>
            <span class="font-medium">Bilibili</span>
        </a>

        <a href="https://www.google.com/maps" target="_blank" class="glass p-5 flex items-center gap-4">
            <div class="w-8 h-8 bg-white rounded-lg flex items-center justify-center text-xl">📍</div>
            <span class="font-medium">Maps</span>
        </a>

        <div onclick="alert('点击这里可以自定义添加更多链接')" class="glass p-5 flex items-center gap-4 border-dashed border-2 border-white/40 cursor-pointer hover:border-white/80 transition-all">
            <div class="w-8 h-8 flex items-center justify-center text-2xl font-light">+</div>
            <span class="font-medium opacity-80">添加快捷</span>
        </div>

    </div>
</div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <span class="text-3xl">☀️</span>
                    <span class="text-sm opacity-70">北京</span>
                </div>
                <div class="bg-white/20 rounded-lg px-3 py-1 self-start mt-2">晴, 28°C</div>
            </div>

            <div class="glass p-6 flex flex-col justify-between h-32">
                <div class="flex justify-between items-start">
                    <span class="text-3xl">📅</span>
                    <span id="weekday" class="text-sm opacity-70">Monday</span>
                </div>
                <div id="date" class="bg-white/20 rounded-lg px-3 py-1 self-start mt-2 text-sm font-mono">2026/01/05</div>
            </div>

            <div class="glass p-6 flex items-center justify-center italic text-center text-sm leading-relaxed px-8">
                "Code is poetry, logic is art."
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            // 更新时钟
            document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', { hour12: false });
            // 更新日期
            const dateOptions = { year: 'numeric', month: '2-digit', day: '2-digit' };
            document.getElementById('date').innerText = now.toLocaleDateString('zh-CN', dateOptions).replace(/\//g, ' / ');
            // 更新星期
            const weekOptions = { weekday: 'long' };
            document.getElementById('weekday').innerText = now.toLocaleDateString('en-US', weekOptions);
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
